# Alembic configuration for TaskFlow backend migrations.
# TODO: Javier Lopez — wire script_location and sqlalchemy.url from app settings.
[alembic]
script_location = migrations
prepend_sys_path = .
# TODO: sqlalchemy.url = driver://user:pass@localhost/dbname (use app settings in env.py)

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
